<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UT CrimeScope</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold" href="/">UT CrimeScope</a>
    <div>
        {% if user.is_authenticated %}
            <div class="d-flex align-items-center gap-3">
                <a class="text-white text-decoration-none" href="/alerts/">Alerts</a>
                <form method="post" action="/accounts/logout/">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-link text-white p-0 text-decoration-none">Logout</button>
                </form>
            </div>
        {% else %}
            <a class="text-white me-3" href="/accounts/login/">Login</a>
            <a class="text-white" href="/register/">Register</a>
        {% endif %}
    </div>
</nav>
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
